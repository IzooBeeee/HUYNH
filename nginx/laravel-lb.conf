# ============================================================
# Nginx Load Balancer config — Laravel LB Demo
# Copy to: /etc/nginx/sites-available/laravel-lb
# Enable: ln -s /etc/nginx/sites-available/laravel-lb /etc/nginx/sites-enabled/
# ============================================================

upstream laravel_servers {
    least_conn;                                       # Thuật toán: ít kết nối nhất

    server 127.0.0.1:8001 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8002 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8003 weight=1 max_fails=3 fail_timeout=30s;

    keepalive 32;                                     # Giữ kết nối để tái sử dụng
}

server {
    listen 80;
    server_name localhost;

    # Bộ nhớ đệm cho upstream state
    proxy_cache_valid 200 1m;

    location / {
        proxy_pass http://laravel_servers;

        # Header chuẩn
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Failover: nếu server timeout/error → thử server khác
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # Timeout settings
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Log format ghi rõ upstream server
    access_log /var/log/nginx/laravel-lb-access.log combined;
    error_log  /var/log/nginx/laravel-lb-error.log warn;
}
